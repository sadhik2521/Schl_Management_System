<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - IFA Portal</title>
    <style>
       :root {
            --bg-light: #f1f5f9;         
            --brand-dark: #0f172a;       
            --brand-mid: #1e293b;        
            --accent-glow: #38bdf8;      
            --btn-primary: #8b5cf6; /* A distinct purple for Faculty */
            --btn-hover: #7c3aed;        
            --text-dark: #0f172a;        
            --text-light: #64748b;       
            --border-color: #e2e8f0;     
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light); color: var(--text-dark);
        }

        .navbar {
            background: var(--brand-dark); border-bottom: 3px solid var(--btn-primary);
            color: white; padding: 15px 40px; display: flex;
            justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }

        .brand-logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 35px; height: 35px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(139, 92, 246, 0.4); border-radius: 8px; display: flex; justify-content: center; align-items: center; color: #a78bfa; }
        .nav-title { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .nav-title span { color: #a78bfa; font-weight: 400; }
        .user-controls { display: flex; align-items: center; gap: 20px; }
        .welcome-text { font-size: 0.95rem; color: #94a3b8; }
        .welcome-text strong { color: white; }

        .logout-btn { background-color: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.3s ease; }
        .logout-btn:hover { background-color: #ef4444; border-color: #ef4444; }

        .dashboard-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--border-color); }

        .profile-sidebar { text-align: center; height: fit-content; }
        .avatar { width: 120px; height: 120px; background: linear-gradient(135deg, var(--btn-primary), #c084fc); border-radius: 50%; margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; color: white; font-size: 3rem; font-weight: bold; border: 4px solid white; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.2); }
        .staff-name { font-size: 1.5rem; color: var(--brand-dark); margin-bottom: 5px; }
        .staff-id { color: var(--text-light); font-size: 0.9rem; margin-bottom: 20px; letter-spacing: 1px; }

        .info-group { text-align: left; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .info-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .info-label { display: block; font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; font-weight: 600; }
        .info-value { font-size: 1rem; color: var(--text-dark); font-weight: 500; }

        .section-header { font-size: 1.25rem; color: var(--brand-dark); margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        
        .class-list { list-style: none; }
        .class-item { padding: 16px; margin-bottom: 12px; background-color: var(--bg-light); border-radius: 8px; border-left: 4px solid var(--btn-primary); }

        .home-link { color: #94a3b8; margin-right: auto; margin-left: 30px; display: flex; align-items: center; transition: all 0.3s ease; text-decoration: none; }
        .home-link:hover { color: var(--btn-primary); transform: translateY(-1px); }

        #loading { text-align: center; font-size: 1.2rem; color: var(--text-light); padding: 50px; }

        @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } .user-controls .welcome-text { display: none; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand-logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path>
                </svg>
            </div>
            <div class="nav-title">IFA <span>Faculty Portal</span></div>
        </div>
        <a href="index.html" class="home-link" title="Back to Login">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
        <div class="user-controls">
            <div class="welcome-text" id="navWelcome">Loading...</div>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <div id="loading">Connecting to Secure Server...</div>
    
    <div class="dashboard-container" id="dashboardContent" style="display: none;">
        <div class="card profile-sidebar">
            <div class="avatar" id="avatarInitials">--</div>
            <h2 class="staff-name" id="profileName">Loading...</h2>
            <div class="staff-id" id="profileId">ID: --------</div>
            
            <div class="info-group">
                <span class="info-label">Department</span>
                <span class="info-value" id="profileDept">--</span>
            </div>
            <div class="info-group">
                <span class="info-label">Staff Email</span>
                <span class="info-value" id="profileEmail">--</span>
            </div>
        </div>

        <div class="card">
            <div class="section-header">
                <h3>Assigned Classes & Modules</h3>
            </div>
            <ul class="class-list" id="classList">
                </ul>
        </div>
    </div>

    <script>
        // 1. Authenticate Session
        const sessionData = localStorage.getItem('userSession');
        
        if (!sessionData) {
            window.location.href = 'index.html';
        } else {
            const user = JSON.parse(sessionData);
            if (user.role !== 'staff') {
                alert("ACCESS DENIED. Faculty only.");
                window.location.href = 'index.html';
            }
            document.getElementById('navWelcome').innerHTML = `Welcome back, <strong>${user.name}</strong>`;
            loadProfileData(user.id);
        }

        // 2. Fetch Data from our Node.js Backend
       // 2. Fetch Data from our Node.js Backend
        async function loadProfileData(userId) {
            try {
                const response = await fetch(`https://schl-management-system2.onrender.com/api/staff/${userId}`);
                
                // Only try to read the JSON if the server successfully responded
                if (response.ok) {
                    const profile = await response.json();
                    renderProfile(profile, userId);
                } else {
                    document.getElementById('loading').innerHTML = `Error: Profile not found.`;
                }
            } catch (error) {
                console.error("Failed to fetch profile:", error);
                document.getElementById('loading').innerHTML = `Connection Error. (Render server might be deploying, try again in 60 seconds).`;
            }
        }

        // 3. Inject the real data into the HTML
        function renderProfile(profile, userId) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'grid';

            document.getElementById('profileName').textContent = profile.name;
            document.getElementById('profileId').textContent = `ID: ${userId.substring(0, 8).toUpperCase()}`;
            document.getElementById('profileEmail').textContent = profile.email;
            document.getElementById('profileDept').textContent = profile.department;
            
            const initials = profile.name.split(' ').map(n => n[0]).join('');
            document.getElementById('avatarInitials').textContent = initials;

            // Generate the list of classes
            let classesHTML = '';
            if (profile.classesTaught && profile.classesTaught.length > 0) {
                profile.classesTaught.forEach(cls => {
                    classesHTML += `<li class="class-item"><h4>${cls}</h4></li>`;
                });
            } else {
                classesHTML = `<li style="color: var(--text-light);">No classes assigned yet.</li>`;
            }
            document.getElementById('classList').innerHTML = classesHTML;
        }

        // 4. Secure Logout Function
        function logout() {
            localStorage.removeItem('userSession');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
